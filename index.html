<!-- Description: A personal library web application that allows users to add, view, and manage their book collection. -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shelf - A Personal Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header Section -->
    <header>
        <h1 class="wordmark">THE <span>Shelf</span></h1>
        <div class="tagline">A house library</div>
    </header>

    <!-- Toolbar - Search and Sort Books -->
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search by title or author…">
        <select id="sortSelect" title="Sort books">
            <option value="recent">Recently added</option>
            <option value="title">Title A-Z</option>
            <option value="author">Author A-Z</option>
            <option value="rating">Highest rated</option>
        </select>
        <!-- Book Add Button -->
        <button class="btn-add" id="openAddBtn" type="button">+ Add a book</button>
    </div>

    <!-- Shelf space -->
    <div class="shelf-wrap">
        <div class="shelf-grid" id="shelfGrid"></div>
        <div class="empty-state" id="emptyState">
            <span class="big">Your shelf is empty.</span>
            Add the first book you've read — cover, rating, and a few honest words about it.
        </div>
    </div>

    <!-- Detail modal -->
    <div class="modal-overlay" id="detailOverlay">
        <div class="card" id="detailCard">
            <div class="card-tab">CATALOG CARD</div>
            <button class="close-x" id="detailClose" aria-label="Close">&times;</button>
            <div class="card-inner" id="detailContent"></div>
        </div>
    </div>

    <!-- Add/Edit modal -->
    <div class="modal-overlay" id="formOverlay">
        <div class="card">
            <div class="card-tab" id="formTab">NEW ENTRY</div>
            <button class="close-x" id="formClose" aria-label="Close">&times;</button>
            <div class="card-inner">
                <h2 class="form-title" id="formTitle">Add a book</h2>
                <!-- Book Form to add new books -->
                <form id="bookForm">
                    <label for="titleInput">Title</label>
                    <input type="text" id="titleInput" class="field" maxlength="140" required>

                    <label for="authorInput">Author</label>
                    <input type="text" id="authorInput" class="field" maxlength="100" required>

                    <label>Cover</label>
                    <div class="cover-row">
                        <input type="text" id="coverUrlInput" class="field" placeholder="Paste an image URL…">
                        <button type="button" class="file-btn" id="uploadBtn">Upload</button>
                        <input type="file" id="coverFileInput" accept="image/*" style="display:none;">
                    </div>
                    <div class="hint">Or leave blank — we'll give it a plain spine instead.</div>
                    <div class="cover-preview-wrap" id="coverPreviewWrap" style="display:none;">
                        <img id="coverPreview" class="cover-preview" alt="Cover preview">
                    </div>

                    <label>Your rating</label>
                    <div class="star-picker" id="starPicker">
                        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span
                            data-v="4">★</span><span data-v="5">★</span>
                    </div>

                    <label for="reviewInput">Review</label>
                    <textarea id="reviewInput" class="field" maxlength="2000"
                        placeholder="What did you think?"></textarea>

                    <div class="error-msg" id="formError"></div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" id="cancelFormBtn">Cancel</button>
                        <button type="submit" class="btn-save">Shelve it</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Javascript file inclusion -->
    <script src="script.js"></script>
</body>

</html>
